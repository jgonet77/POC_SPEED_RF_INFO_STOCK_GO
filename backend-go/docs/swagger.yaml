basePath: /
definitions:
  models.ActivityItem:
    properties:
      act_code:
        type: string
      act_keyu:
        type: integer
      act_lib:
        type: string
    type: object
  models.ActivityListResponse:
    properties:
      activities:
        items:
          $ref: '#/definitions/models.ActivityItem'
        type: array
      message:
        type: string
      status:
        description: '"success" or "error"'
        type: string
    type: object
  models.HealthResponse:
    properties:
      database_status:
        type: string
      details:
        additionalProperties: true
        type: object
      service:
        type: string
    type: object
  models.LoginRequest:
    properties:
      hash_method:
        description: '"CLAIR", "MD5", or "SHA256"'
        type: string
      login:
        type: string
      password:
        type: string
    type: object
  models.LoginResponse:
    properties:
      expires_in:
        description: Only on success (86400 for 24h)
        type: integer
      log_location:
        description: Only on error
        type: string
      message:
        type: string
      status:
        description: '"success" or "error"'
        type: string
      token:
        description: Only on success
        type: string
    type: object
  models.StockItem:
    properties:
      art_code:
        type: string
      qua_code:
        type: string
      stk_lieu:
        type: string
      stk_nosu:
        type: string
      stk_qte:
        type: integer
    type: object
  models.StockSearchRequest:
    properties:
      act_code:
        description: Activity code (required, filtered from Android)
        type: string
      art_code:
        type: string
      stk_lieu:
        type: string
      stk_nosu:
        type: string
    type: object
  models.StockSearchResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/models.StockItem'
        type: array
      message:
        type: string
      status:
        description: '"success" or "error"'
        type: string
    type: object
info:
  contact:
    email: jerome.gouez@bksystemes.fr
    name: BK Systèmes
  description: API de consultation du stock pour l'application mobile Android (POC)
  title: Stock API — WMS SPEED
  version: 0.1.0
paths:
  /api/activities:
    get:
      description: Retourne toutes les activités actives (ACT_ACTF=1) de la table
        ACT_PAR
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ActivityListResponse'
        "401":
          description: Token manquant ou invalide
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ActivityListResponse'
      security:
      - BearerAuth: []
      summary: Liste des activités
      tags:
      - activities
  /api/health/api:
    get:
      description: Retourne 200 si le processus API est actif (ne nécessite pas SQL
        Server)
      produces:
      - application/json
      responses:
        "200":
          description: status=healthy
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Santé de l'API
      tags:
      - health
  /api/health/database:
    get:
      description: Teste la connexion à SQL Server et retourne la version et l'heure
        serveur
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.HealthResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Connexion SQL Server
      tags:
      - health
  /api/login:
    post:
      consumes:
      - application/json
      description: Authentifie un utilisateur et retourne un JWT valable 24h
      parameters:
      - description: Identifiants
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login réussi — contient le token
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "400":
          description: hash_method invalide
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "401":
          description: Login ou mot de passe incorrect
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "500":
          description: Erreur base de données ou JWT
          schema:
            $ref: '#/definitions/models.LoginResponse'
      summary: Authentification
      tags:
      - auth
  /api/stock/details/{sku}:
    get:
      description: Retourne les informations détaillées d'un article (non encore implémenté)
      parameters:
      - description: Code article (SKU)
        in: path
        name: sku
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Token manquant ou invalide
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Détail stock par SKU
      tags:
      - stock
  /api/stock/search:
    post:
      consumes:
      - application/json
      description: Recherche des articles en stock filtrés par activité. Au moins
        un critère parmi art_code, stk_lieu, stk_nosu est obligatoire.
      parameters:
      - description: Critères de recherche
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.StockSearchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Résultats (items peut être vide)
          schema:
            $ref: '#/definitions/models.StockSearchResponse'
        "401":
          description: Token manquant ou invalide
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Corps invalide ou act_code manquant
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Recherche stock
      tags:
      - stock
securityDefinitions:
  BearerAuth:
    description: 'JWT obtenu via POST /api/login. Format : "Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
